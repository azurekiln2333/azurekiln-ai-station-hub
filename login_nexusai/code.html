<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Background Pattern -->
<div class="fixed inset-0 tech-pattern pointer-events-none -z-10"></div>
<div class="fixed inset-0 bg-gradient-to-br from-primary/5 via-transparent to-secondary/5 pointer-events-none -z-10"></div>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-stack-lg relative">
<!-- Login Card -->
<div class="w-full max-w-[440px] glass-effect border border-outline-variant rounded-xl shadow-lg p-stack-lg flex flex-col gap-stack-lg transition-all hover:shadow-xl duration-300">
<!-- Logo & Header -->
<div class="flex flex-col items-center gap-stack-sm text-center">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">hub</span>
<span class="text-headline-md font-headline-md font-bold text-primary tracking-tight">NexusAI</span>
</div>
<h1 class="text-headline-md font-headline-md text-on-surface">Welcome back</h1>
<p class="text-body-sm font-body-sm text-on-surface-variant">Precision intelligence for the modern developer.</p>
</div>
<!-- Social Login Options -->
<div class="flex flex-col gap-stack-sm">
<button class="w-full flex items-center justify-center gap-3 px-4 h-12 bg-surface-container-lowest border border-outline-variant rounded-lg text-body-md font-medium hover:bg-surface-container-low transition-colors duration-200">
<img alt="Google" class="w-5 h-5" data-alt="A high-definition, minimalist logo of Google on a clean white background. The icon is sharp and centered, representing global technology and accessibility. The aesthetic is professional and corporate, matching a light-mode modern interface with clean lines and vibrant primary colors." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdfnTPZnxLkC_ln7fqFNsUIQSaMenbJQ_mezorFwK-w5iXYKfvZC3tbf0lZEtCpdgxzlCgPI--6eYjLcxCOAI9fiR6add1am3CKxdr_NzOFZUdrgDM7PD9SKFoJYOqD_EeqgI9OgYZm_hS88_o-LC9jYVlx7pbwE1x43v3ix-oKPUi8GylY9uQlMNo-fZF4ggrJB0BofhrDD_8_322sDjKbjUaysObNu4pmSAHh0CXhr3NdD0ZldOnzOBrjFm2lOwDtBw-B37aR0Jk"/>
<span>Continue with Google</span>
</button>
<button class="w-full flex items-center justify-center gap-3 px-4 h-12 bg-surface-container-lowest border border-outline-variant rounded-lg text-body-md font-medium hover:bg-surface-container-low transition-colors duration-200">
<span class="material-symbols-outlined text-on-surface">code</span>
<span>Continue with GitHub</span>
</button>
</div>
<div class="flex items-center gap-stack-md">
<div class="h-px flex-grow bg-outline-variant"></div>
<span class="text-label-sm font-label-sm text-outline uppercase tracking-widest">or email</span>
<div class="h-px flex-grow bg-outline-variant"></div>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-1.5">
<label class="text-label-md font-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary focus:bg-white transition-all outline-none text-body-md" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="text-label-md font-label-md text-on-surface-variant" for="password">Password</label>
<a class="text-label-sm font-label-sm text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-12 pl-10 pr-10 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary focus:bg-white transition-all outline-none text-body-md" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-2 mt-2">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-body-sm font-body-sm text-on-surface-variant" for="remember">Keep me logged in for 30 days</label>
</div>
<button class="w-full h-12 bg-primary text-on-primary rounded-lg font-body-md font-semibold mt-2 hover:bg-primary/90 active:scale-[0.98] transition-all shadow-md flex items-center justify-center gap-2">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<p class="text-center text-body-sm font-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline" href="#">Get Started</a>
</p>
</div>
</main>
<!-- Footer Component from Shared Components -->
<footer class="w-full px-margin-desktop py-stack-lg max-w-container-max mx-auto flex flex-col md:flex-row justify-between items-center gap-gutter bg-surface-container-lowest border-t border-outline-variant">
<div class="flex flex-col md:flex-row items-center gap-6">
<span class="text-headline-md font-headline-md text-on-surface tracking-tight font-bold">NexusAI</span>
<span class="text-body-sm font-body-sm text-on-surface-variant">© 2024 NexusAI. Precision in Proxy Aggregation.</span>
</div>
<div class="flex flex-wrap justify-center gap-stack-md">
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-all duration-200" href="#">Documentation</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-all duration-200" href="#">API Reference</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-all duration-200" href="#">Status</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-all duration-200" href="#">Privacy Policy</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-all duration-200" href="#">Terms of Service</a>
</div>
</footer>
<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.parentElement.classList.add('scale-[1.01]');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.parentElement.classList.remove('scale-[1.01]');
                });
            });

            const passwordToggle = document.querySelector('button[type="button"]');
            const passwordInput = document.getElementById('password');
            const toggleIcon = passwordToggle?.querySelector('.material-symbols-outlined');

            passwordToggle?.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                toggleIcon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        });
    </script>
</body></html>
